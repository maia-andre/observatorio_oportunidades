version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: observatorio_db
    environment:
      POSTGRES_USER: observatorio
      POSTGRES_PASSWORD: observatorio_password
      POSTGRES_DB: observatorio_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
