# OPCIONAL — necessário apenas para quem quiser rodar com PostgreSQL.
# O banco padrão da Fase 0 é SQLite (não requer Docker). Veja CLAUDE.md / docs/arquitetura.
version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: observatorio_db
    environment:
      POSTGRES_USER: observatorio
      POSTGRES_PASSWORD: observatorio_password
      POSTGRES_DB: observatorio_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
