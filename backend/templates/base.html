<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Observatório de Oportunidades Institucionais{% endblock %}</title>
    <style>
        /* ---- Reset enxuto (sem framework, controle total do layout) ---- */
        *, *::before, *::after { box-sizing: border-box; }
        html { -webkit-text-size-adjust: 100%; }
        body {
            margin: 0; font-size: 15px; line-height: 1.5; color: #1f2d3d;
            background: #eef2f6;
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        a { color: #1565a6; text-decoration: none; }
        a:hover { text-decoration: underline; }
        h1, h2, h3, p { margin: 0; }

        /* ---- Cabeçalho institucional ---- */
        .site-header { background: linear-gradient(100deg, #0b3d6b, #1565a6); color: #fff; }
        .site-header .wrap {
            max-width: 1180px; margin: 0 auto; padding: 16px 24px;
            display: flex; align-items: center; gap: 14px;
        }
        .brasao {
            width: 46px; height: 46px; border-radius: 10px; flex: 0 0 auto;
            background: rgba(255, 255, 255, .15); display: flex; align-items: center; justify-content: center;
        }
        .site-header h1 { font-size: 20px; font-weight: 700; line-height: 1.2; }
        .site-header .subtitulo { font-size: 13px; opacity: .85; margin-top: 2px; }

        /* ---- Layout ---- */
        .page { max-width: 1180px; margin: 24px auto; padding: 0 24px; }
        .card {
            background: #fff; border: 1px solid #dce4ec; border-radius: 12px;
            box-shadow: 0 1px 3px rgba(16, 40, 70, .06);
        }

        /* ---- Campos de formulário (estilo próprio) ---- */
        input[type=search], select {
            width: 100%; padding: 9px 11px; font-size: 14px; font-family: inherit; color: #1f2d3d;
            background: #fff; border: 1px solid #cdd7e1; border-radius: 8px; line-height: 1.3;
        }
        select { cursor: pointer; }
        input[type=search]:focus, select:focus {
            outline: none; border-color: #1565a6; box-shadow: 0 0 0 3px rgba(21, 101, 166, .15);
        }
        .btn {
            display: inline-block; padding: 9px 22px; font-size: 14px; font-weight: 600; font-family: inherit;
            color: #fff; background: #0b3d6b; border: 1px solid #0b3d6b; border-radius: 8px;
            cursor: pointer; white-space: nowrap; text-align: center;
        }
        .btn:hover { background: #1565a6; border-color: #1565a6; text-decoration: none; }
        .btn-outline { background: #fff; color: #0b3d6b; }
        .btn-outline:hover { background: #eaf1f8; color: #0b3d6b; }
        .btn-sm { padding: 6px 13px; font-size: 13px; }

        /* ---- Painel de filtros ---- */
        .filtros { padding: 18px 20px; margin-bottom: 20px; }
        .busca-row { display: flex; gap: 10px; margin-bottom: 14px; }
        .busca-row input { flex: 1 1 auto; min-width: 0; }
        .busca-row .btn { flex: 0 0 auto; }
        .filtros-grid { display: flex; flex-wrap: wrap; gap: 12px 16px; }
        .field { flex: 1 1 180px; min-width: 150px; display: flex; flex-direction: column; }
        .field > label {
            font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .04em;
            color: #5b6b7b; margin-bottom: 5px;
        }
        .field.check {
            flex: 0 0 auto; min-width: auto; flex-direction: row; align-items: center; gap: 8px;
            align-self: flex-end; padding-bottom: 9px;
        }
        .field.check input { width: auto; }
        .field.check label { font-size: 14px; color: #1f2d3d; }

        /* ---- Barra de resultados ---- */
        .resultados-bar {
            display: flex; justify-content: space-between; align-items: center;
            flex-wrap: wrap; gap: 8px; margin-bottom: 12px;
        }
        .resultados-bar .total { font-size: 17px; font-weight: 700; color: #0b3d6b; }
        .tag {
            font-size: 12px; color: #5b6b7b; background: #fff; border: 1px solid #dce4ec;
            border-radius: 99px; padding: 3px 11px; margin-left: 6px;
        }

        /* ---- Tabela ---- */
        .tabela { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        thead th {
            text-align: left; padding: 11px 14px; background: #eaf1f8; color: #0b3d6b;
            font-size: 12px; text-transform: uppercase; letter-spacing: .03em; border-bottom: 2px solid #dce4ec;
        }
        tbody td { padding: 13px 14px; border-bottom: 1px solid #eef2f6; vertical-align: top; }
        tbody tr:last-child td { border-bottom: none; }
        tbody tr:hover { background: #f7fafd; }
        .titulo-op { font-weight: 600; color: #0b3d6b; }
        .meta-linha { font-size: 13px; color: #5b6b7b; margin-top: 4px; }

        /* ---- Chips ---- */
        .chip { display: inline-block; background: #0b3d6b; color: #fff; font-size: 12px; font-weight: 600; padding: 2px 10px; border-radius: 99px; }
        .chip-sec { display: inline-block; background: #e7eef6; color: #1565a6; font-size: 11px; padding: 2px 8px; border-radius: 99px; margin: 2px 0 0 4px; }
        .status-tag { font-size: 11px; color: #8190a0; margin-top: 6px; }

        /* ---- Aderência (matching) ---- */
        .aderencia { margin-top: 6px; display: flex; align-items: center; gap: 8px; }
        .score { flex: 0 0 auto; min-width: 34px; height: 25px; padding: 0 7px; display: flex; align-items: center; justify-content: center; color: #fff; border-radius: 6px; font-weight: 700; font-size: 13px; }
        .aderencia .just { font-size: 12px; color: #5b6b7b; }

        /* ---- Detalhe ---- */
        .voltar { display: inline-block; margin-bottom: 14px; }
        .detalhe { padding: 28px 32px; }
        .detalhe h2 { font-size: 24px; color: #0b3d6b; margin-bottom: 10px; }
        .detalhe .cabecalho-chips { margin-bottom: 4px; }
        .meta {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px;
            background: #f3f6fa; border: 1px solid #dce4ec; border-radius: 10px; padding: 16px 18px; margin: 18px 0;
        }
        .meta .rotulo { font-size: 11px; text-transform: uppercase; letter-spacing: .05em; color: #5b6b7b; margin-bottom: 4px; }
        .meta .valor { font-size: 17px; font-weight: 700; }
        .descricao { line-height: 1.7; }

        /* ---- Curadoria LLM (opcional) ---- */
        .curadoria { background: #f2f8f4; border: 1px solid #cfe3d4; border-radius: 10px; padding: 14px 18px; margin-bottom: 18px; }
        .curadoria .selo { font-size: 11px; text-transform: uppercase; letter-spacing: .05em; color: #0b6b3d; font-weight: 700; margin-bottom: 6px; }
        .curadoria .resumo { line-height: 1.6; }
        .curadoria .secretaria { font-size: 13px; color: #0b6b3d; margin-top: 6px; }
        .detalhe-footer { margin-top: 22px; padding-top: 16px; border-top: 1px solid #dce4ec; display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }

        /* ---- Paginação / rodapé ---- */
        .paginacao { display: flex; justify-content: space-between; align-items: center; margin-top: 18px; font-size: 14px; }
        .pg-info { color: #5b6b7b; }
        .disabled { opacity: .45; pointer-events: none; }
        .site-footer { text-align: center; color: #8190a0; font-size: 13px; padding: 28px 0 36px; }

        @media (max-width: 560px) {
            .busca-row { flex-direction: column; }
            .busca-row .btn { width: 100%; }
            .meta { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <header class="site-header">
        <div class="wrap">
            <div class="brasao" aria-hidden="true">
                <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#fff"
                     stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 21h18M4 10h16M5 10l7-6 7 6M6 10v8M10 10v8M14 10v8M18 10v8"/>
                </svg>
            </div>
            <div>
                <h1>Observatório de Oportunidades Institucionais</h1>
                <p class="subtitulo">{% block subtitle %}Radar de editais, premiações, emendas e convênios{% endblock %}</p>
            </div>
        </div>
    </header>

    <main class="page">
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">Observatório de Oportunidades · uso interno</footer>
</body>
</html>
